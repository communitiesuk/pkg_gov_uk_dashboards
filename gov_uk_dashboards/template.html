<!DOCTYPE html>
<html lang="en" class="govuk-template">
  <head>
    {%metas%}
    <title>{%title%}</title>
    <link rel="icon" href="{{favicon_path}}" type="image/x-icon">
    {%css%}
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <script async src="https://www.googletagmanager.com/gtag/js?id={{gtag}}"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', '{{gtag}}');
    </script>
    <script type="module">
      import {onCLS, onINP, onLCP} from 'https://cdn.jsdelivr.net/npm/web-vitals@4.2.4/dist/web-vitals.min.js';
      function sendToGoogleAnalytics({name, delta, value, id, rating, entries}) {
        const metricStartTime = Math.round(
          entries?.[entries.length - 1]?.startTime ?? performance.now()
        );

        gtag('event', name, {
          value: delta,
          metric_id: id,
          metric_value: value,
          metric_delta: delta,
          metric_start_time: metricStartTime,
          metric_rating: rating,
        });
      }
      setTimeout(() => {
        onCLS(sendToGoogleAnalytics);

        onINP(sendToGoogleAnalytics);

        onLCP(sendToGoogleAnalytics);

      }, 200);
      
    </script>
  </head>
  <body class="govuk-template__body">
    <div class="visually-hidden" id="readTitle" role="status"></div>
    {%app_entry%}
    {%config%}
    {%scripts%}
    {%renderer%}
  </body>
</html>
